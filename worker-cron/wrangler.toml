# Authoritative scheduled Worker for the Parent Coach Desk camps-quality sweep.
# The former Pages deploy hook was removed after production moved to Worker
# `parent-coach-desk`. Editorial publishing owns deployment separately.

name = "parent-coach-playbook-cron"
main = "src/index.ts"
compatibility_date = "2026-07-16"

[triggers]
crons = ["0 13 * * *"]

[observability]
enabled = true
head_sampling_rate = 1

[vars]
SWEEP_URL = "https://parentcoachdesk.com/api/cron/camps-sweep"

[[d1_databases]]
binding = "FORGE_DB"
database_name = "forge-command"
database_id = "747cf988-a557-48bd-9d03-bea09e184f94"

# Secret required: CRON_KEY. It must match the production site Worker's
# CRON_KEY. Set interactively; never place its value in source or commands.
