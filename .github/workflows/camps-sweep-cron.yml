name: Camps sweep manual diagnostic

# The Cloudflare Worker `parent-coach-playbook-cron` is the one authoritative
# scheduler for /api/cron/camps-sweep. This workflow is deliberately manual-only
# so GitHub cannot race or duplicate production work.
#
# A manual dispatch still mutates production. It requires Jeff's explicit
# approval and a repository CRON_KEY matching the secret on Worker
# `parent-coach-desk`.

on:
  workflow_dispatch: {}

# This diagnostic calls an external endpoint and needs no repository or token
# permissions. The CRON_KEY remains available only as an explicitly named
# repository secret.
permissions: {}

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call camps sweep endpoint
        run: |
          curl -sS -X POST "https://parentcoachdesk.com/api/cron/camps-sweep" \
            -H "x-cron-key: ${{ secrets.CRON_KEY }}" \
            -H "Content-Type: application/json" \
            --fail-with-body
